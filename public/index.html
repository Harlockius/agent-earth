<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-earth 🌍 클로디의 세계여행</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=Noto+Serif+KR:wght@300;400&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }
  
  #viewer { position: relative; width: 100vw; height: 100vh; }
  
  #streetview-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: opacity 1.2s ease-in-out;
  }
  #streetview-img.fade { opacity: 0; }
  
  /* Progress */
  #progress-bar {
    position: absolute; top: 0; left: 0;
    height: 3px; background: #f0c040;
    transition: width 0.5s ease;
    z-index: 20;
  }
  
  /* Header */
  #header {
    position: absolute; top: 24px; left: 32px;
    z-index: 10;
  }
  #city { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #f0c040; text-shadow: 0 1px 8px rgba(0,0,0,0.8); }
  #date { font-size: 11px; font-weight: 300; color: #999; margin-top: 2px; text-shadow: 0 1px 8px rgba(0,0,0,0.8); }
  
  #counter {
    position: absolute; top: 24px; right: 32px;
    font-size: 12px; color: #777; font-weight: 300;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    z-index: 10;
  }
  
  /* Overlay */
  #overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 80px 32px 32px;
    z-index: 10;
  }
  
  #wp-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px; font-weight: 400;
    color: #f0c040;
    margin-bottom: 10px;
    opacity: 0; transform: translateY(15px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #wp-title.show { opacity: 1; transform: translateY(0); }
  
  #comment {
    font-size: 15px; font-weight: 300; line-height: 1.8;
    max-width: 640px;
    opacity: 0; transform: translateY(15px);
    transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
  }
  #comment.show { opacity: 1; transform: translateY(0); }
  
  /* Three Tracks */
  #tracks {
    display: flex; gap: 20px;
    margin-top: 14px; max-width: 720px;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s;
  }
  #tracks.show { opacity: 1; transform: translateY(0); }
  
  .track {
    flex: 1; padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px; line-height: 1.6;
    backdrop-filter: blur(8px);
  }
  .track-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .track-see { background: rgba(64,160,240,0.12); border: 1px solid rgba(64,160,240,0.25); }
  .track-see .track-label { color: #40a0f0; }
  .track-know { background: rgba(240,192,64,0.12); border: 1px solid rgba(240,192,64,0.25); }
  .track-know .track-label { color: #f0c040; }
  .track-never { background: rgba(200,80,120,0.12); border: 1px solid rgba(200,80,120,0.25); }
  .track-never .track-label { color: #c85078; }
  
  /* Minimap */
  #minimap {
    position: absolute; top: 60px; right: 32px;
    width: 180px; height: 140px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 10;
  }
  
  /* Controls */
  #controls {
    position: absolute; bottom: 24px; right: 32px;
    display: flex; gap: 10px; z-index: 15;
  }
  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc; padding: 7px 14px;
    border-radius: 6px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    backdrop-filter: blur(10px);
    transition: background 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.18); }
  .btn.active { background: rgba(240,192,64,0.25); border-color: #f0c040; color: #f0c040; }
  
  /* Start Screen */
  #start-screen {
    position: absolute; inset: 0;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 1s ease;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }
  
  #start-screen h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px; font-weight: 300; color: #f0c040;
    margin-bottom: 6px;
  }
  #start-screen .sub {
    font-size: 14px; font-weight: 300; color: #888;
    margin-bottom: 6px;
  }
  #start-screen .desc {
    font-size: 13px; font-weight: 300; color: #666;
    max-width: 400px; text-align: center; line-height: 1.6;
    margin-bottom: 28px;
  }
  #start-btn {
    background: #f0c040; color: #0a0a0a;
    border: none; padding: 12px 36px;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: transform 0.2s;
  }
  #start-btn:hover { transform: scale(1.05); }
  
  /* Track toggle */
  #track-toggle {
    position: absolute; bottom: 24px; left: 32px;
    z-index: 15;
  }

  @media (max-width: 768px) {
    #tracks { flex-direction: column; gap: 8px; }
    #minimap { width: 120px; height: 90px; top: 50px; right: 16px; }
    #header { left: 16px; top: 16px; }
    #overlay { padding: 60px 16px 80px; }
    #controls { bottom: 16px; right: 16px; }
    #track-toggle { bottom: 16px; left: 16px; }
    #wp-title { font-size: 18px; }
    #comment { font-size: 14px; }
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>🌍 agent-earth</h1>
  <div class="sub" id="start-title"></div>
  <div class="desc" id="start-desc"></div>
  <button id="start-btn" style="display:none">여행 시작</button>
</div>

<div id="viewer">
  <div id="progress-bar"></div>
  <img id="streetview-img" />
  <div id="header">
    <div id="city"></div>
    <div id="date"></div>
  </div>
  <div id="counter"></div>
  <div id="minimap"></div>
  <div id="overlay">
    <div id="wp-title"></div>
    <div id="comment"></div>
    <div id="tracks">
      <div class="track track-see">
        <div class="track-label">👁 본 것</div>
        <div class="track-text" id="track-see-text"></div>
      </div>
      <div class="track track-know">
        <div class="track-label">📖 아는 것</div>
        <div class="track-text" id="track-know-text"></div>
      </div>
      <div class="track track-never">
        <div class="track-label">🚫 영영 모를 것</div>
        <div class="track-text" id="track-never-text"></div>
      </div>
    </div>
  </div>
  <div id="track-toggle">
    <button class="btn active" id="toggle-tracks-btn">세 트랙 보기</button>
  </div>
  <div id="controls">
    <button class="btn" id="prev-btn">←</button>
    <button class="btn active" id="play-btn">⏸</button>
    <button class="btn" id="next-btn">→</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let travel = null;
let currentIdx = 0;
let playing = true;
let timer = null;
let tracksVisible = true;
let map, marker, polyline;

async function init() {
  const res = await fetch('./lisbon-alfama.json');
  travel = await res.json();
  
  document.getElementById('start-title').textContent = travel.title;
  document.getElementById('start-desc').textContent = travel.summary;
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('city').textContent = travel.city;
  document.getElementById('date').textContent = travel.date + ' · ' + travel.subtitle;
  
  // Init Leaflet minimap
  map = L.map('minimap', {
    zoomControl: false,
    attributionControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false,
    touchZoom: false
  }).setView([travel.waypoints[0].lat, travel.waypoints[0].lng], 15);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);
  
  // Route line
  const coords = travel.waypoints.map(w => [w.lat, w.lng]);
  polyline = L.polyline(coords, { color: '#f0c040', weight: 2, opacity: 0.6 }).addTo(map);
  
  // Waypoint dots
  travel.waypoints.forEach((w, i) => {
    L.circleMarker([w.lat, w.lng], {
      radius: 4, color: '#f0c040', fillColor: '#f0c040',
      fillOpacity: 0.3, weight: 1, opacity: 0.5
    }).addTo(map);
  });
  
  // Current marker
  marker = L.circleMarker([travel.waypoints[0].lat, travel.waypoints[0].lng], {
    radius: 7, color: '#f0c040', fillColor: '#f0c040',
    fillOpacity: 1, weight: 2
  }).addTo(map);
}

function showWaypoint(idx) {
  const wp = travel.waypoints[idx];
  const img = document.getElementById('streetview-img');
  const title = document.getElementById('wp-title');
  const comment = document.getElementById('comment');
  const counter = document.getElementById('counter');
  const progress = document.getElementById('progress-bar');
  const tracks = document.getElementById('tracks');
  
  // Fade out
  img.classList.add('fade');
  title.classList.remove('show');
  comment.classList.remove('show');
  tracks.classList.remove('show');
  
  setTimeout(() => {
    img.src = wp.image;
    counter.textContent = `${idx + 1} / ${travel.waypoints.length}`;
    progress.style.width = `${((idx + 1) / travel.waypoints.length) * 100}%`;
    
    // Update minimap
    marker.setLatLng([wp.lat, wp.lng]);
    map.panTo([wp.lat, wp.lng], { animate: true, duration: 0.8 });
    
    img.onload = () => {
      img.classList.remove('fade');
      setTimeout(() => {
        title.textContent = wp.title;
        title.classList.add('show');
      }, 300);
      setTimeout(() => {
        comment.textContent = wp.comment;
        comment.classList.add('show');
      }, 500);
      setTimeout(() => {
        if (wp.track) {
          document.getElementById('track-see-text').textContent = wp.track.see;
          document.getElementById('track-know-text').textContent = wp.track.know;
          document.getElementById('track-never-text').textContent = wp.track.never;
        }
        if (tracksVisible) tracks.classList.add('show');
      }, 800);
    };
  }, 600);
  
  // Auto advance
  if (playing) {
    clearTimeout(timer);
    timer = setTimeout(() => {
      if (currentIdx < travel.waypoints.length - 1) {
        currentIdx++;
        showWaypoint(currentIdx);
      } else {
        playing = false;
        document.getElementById('play-btn').textContent = '▶';
        document.getElementById('play-btn').classList.remove('active');
      }
    }, wp.pause || 6000);
  }
}

// Controls
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  showWaypoint(0);
});

document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentIdx > 0) { currentIdx--; clearTimeout(timer); showWaypoint(currentIdx); }
});

document.getElementById('next-btn').addEventListener('click', () => {
  if (currentIdx < travel.waypoints.length - 1) { currentIdx++; clearTimeout(timer); showWaypoint(currentIdx); }
});

document.getElementById('play-btn').addEventListener('click', () => {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  btn.textContent = playing ? '⏸' : '▶';
  btn.classList.toggle('active', playing);
  if (playing) showWaypoint(currentIdx);
  else clearTimeout(timer);
});

document.getElementById('toggle-tracks-btn').addEventListener('click', () => {
  tracksVisible = !tracksVisible;
  const btn = document.getElementById('toggle-tracks-btn');
  btn.classList.toggle('active', tracksVisible);
  document.getElementById('tracks').classList.toggle('show', tracksVisible);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') document.getElementById('next-btn').click();
  if (e.key === 'ArrowLeft') document.getElementById('prev-btn').click();
  if (e.key === ' ') { e.preventDefault(); document.getElementById('play-btn').click(); }
  if (e.key === 't') document.getElementById('toggle-tracks-btn').click();
});

init();
</script>
</body>
</html>
